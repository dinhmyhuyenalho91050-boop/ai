name: Android CI

on:
  push:
    branches: [ "main", "work", "native" ]
  pull_request:
    branches: [ "main", "work" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Restore release signing key
        env:
          AI_CHAT_KEYSTORE_BASE64: ${{ secrets.AI_CHAT_KEYSTORE_BASE64 }}
          AI_CHAT_KEYSTORE_PASSWORD: ${{ secrets.AI_CHAT_KEYSTORE_PASSWORD }}
          AI_CHAT_KEY_PASSWORD: ${{ secrets.AI_CHAT_KEY_PASSWORD }}
        run: |
          if [ -z "$AI_CHAT_KEYSTORE_BASE64" ]; then
            echo "::error::AI_CHAT_KEYSTORE_BASE64 is required for fixed release signing."
            exit 1
          fi
          if [ -z "$AI_CHAT_KEYSTORE_PASSWORD" ]; then
            echo "::error::AI_CHAT_KEYSTORE_PASSWORD is required for fixed release signing."
            exit 1
          fi

          mkdir -p app/signing
          printf '%s' "$AI_CHAT_KEYSTORE_BASE64" | base64 --decode > app/signing/release.p12
          KEY_ALIAS="$(keytool -list -v \
            -keystore app/signing/release.p12 \
            -storetype pkcs12 \
            -storepass "$AI_CHAT_KEYSTORE_PASSWORD" \
            | awk -F': ' '/Alias name:/{print $2; exit}')"
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::Could not read a key alias from the release signing keystore."
            exit 1
          fi
          {
            echo "AI_CHAT_KEYSTORE_FILE=app/signing/release.p12"
            echo "AI_CHAT_KEYSTORE_TYPE=pkcs12"
            echo "AI_CHAT_KEY_ALIAS=$KEY_ALIAS"
            echo "AI_CHAT_KEYSTORE_PASSWORD=$AI_CHAT_KEYSTORE_PASSWORD"
            echo "AI_CHAT_KEY_PASSWORD=${AI_CHAT_KEY_PASSWORD:-$AI_CHAT_KEYSTORE_PASSWORD}"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
