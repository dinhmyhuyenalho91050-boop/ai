const RX_PATTERNS={
  quote:/[""\u201C\u201D\uFF02]([^""\u201C\u201D\uFF02]+?)[""\u201C\u201D\uFF02]/g,
  star:/[\*\uFF0A]([^\*\uFF0A]+?)[\*\uFF0A]/g,
  newline:/\n/g,
  hasSpecial:/[""\u201C\u201D\uFF02\*\uFF0A]/
};

const SPECIAL_CHARS=new Set([34,42,8220,8221,65282,65290]);

// ===== SmartSanitizer - ✅ 简化版：全量处理更快 =====
class SmartSanitizer{
  constructor(){
    this.cache=new Map();
    this.maxCacheSize=500;
  }
  
  sanitize(text,isStreaming=false,streamId=null){
    if(!text)return '';
    
    // 流式输出时不使用缓存，直接全量处理（更快更稳定）
    if(isStreaming)return this.process(text);
    
    // 非流式才使用缓存（历史消息）
    if(this.cache.has(text))return this.cache.get(text);
    const result=this.process(text);
    this.addToCache(text,result);
    return result;
  }
  
  process(text){
    let s=String(text);
    if(!RX_PATTERNS.hasSpecial.test(s))return s.replace(RX_PATTERNS.newline,'<br/>');
    s=s.replace(RX_PATTERNS.quote,(m,content)=>`<em class='em-green'>"${content}"</em>`);
    s=s.replace(RX_PATTERNS.star,(m,content)=>`<em class='em-yellow'>${content}</em>`);
    return s.replace(RX_PATTERNS.newline,'<br/>');
  }
  
  addToCache(key,value){
    if(this.cache.size>=this.maxCacheSize){
      const firstKey=this.cache.keys().next().value;
      this.cache.delete(firstKey);
    }
    this.cache.set(key,value);
  }
}

// ===== DOMDiffer - 保留改进的append优化 =====
class DOMDiffer{
  constructor(){
    this.cache=new WeakMap();
  }
  
  updateHTML(el,newHTML){
    const oldHTML=this.cache.get(el);
    if(oldHTML===newHTML)return;
    
    // ✅ 前缀检查+insertAdjacentHTML优化
    if(oldHTML&&newHTML.startsWith(oldHTML)){
      const diff=newHTML.slice(oldHTML.length);
      const temp=document.createElement('div');
      temp.innerHTML=diff;
      const cursor=el.querySelector('.typing-cursor');
      if(cursor)cursor.remove();
      while(temp.firstChild)el.appendChild(temp.firstChild);
      if(cursor)el.appendChild(cursor);
      this.cache.set(el,newHTML);
      return;
    }
    
    el.innerHTML=newHTML;
    this.cache.set(el,newHTML);
  }
}

// ===== AdaptiveStreamBatcher =====
class AdaptiveStreamBatcher{
  constructor(updateFn){
    this.updateFn=updateFn;
    this.buffer='';
    this.thinkingBuffer='';
    this.rafId=null;
    this.timeoutId=null;
    this.lastUpdate=0;
    this.updateCount=0;
    this.windowStart=Date.now();
    this.currentInterval=30;
    this.avgRenderTime=0;
    this.renderSamples=[];
    this.isBackground=false;
    this.hasPending=false;
  }

  push(text,thinking){
    this.buffer=text;
    this.thinkingBuffer=thinking||'';
    this.updateCount++;
    this.hasPending=true;
    if(this.isBackground){
      return;
    }
    this.scheduleUpdate();
  }

  setBackgroundMode(flag){
    const next=!!flag;
    if(this.isBackground===next)return;
    this.isBackground=next;
    if(next){
      if(this.rafId){ cancelAnimationFrame(this.rafId); this.rafId=null; }
      if(this.timeoutId){ clearTimeout(this.timeoutId); this.timeoutId=null; }
    }else{
      this.flushPending(true);
    }
  }

  scheduleUpdate(){
    if(this.isBackground){
      return;
    }
    if(this.rafId){
      return;
    }
    const now=performance.now();
    const elapsed=now-this.lastUpdate;
    this.adjustInterval();

    if(elapsed>=this.currentInterval){
      this.rafId=requestAnimationFrame(()=>this.flush());
    }else{
      if(this.timeoutId)clearTimeout(this.timeoutId);
      this.timeoutId=setTimeout(()=>{
        this.rafId=requestAnimationFrame(()=>this.flush());
      },this.currentInterval-elapsed);
    }
  }
  
  flush(){
    const start=performance.now();
    try{
      this.updateFn(this.buffer,this.thinkingBuffer);
    }catch{}
    const renderTime=performance.now()-start;
    this.recordRenderTime(renderTime);
    this.lastUpdate=performance.now();
    this.rafId=null;
    this.timeoutId=null;
    this.hasPending=false;
  }

  adjustInterval(){
    const now=Date.now();
    const windowDuration=now-this.windowStart;
    if(windowDuration<1000)return;
    
    const updatesPerSec=this.updateCount/(windowDuration/1000);
    if(updatesPerSec>40||this.avgRenderTime>12){
      this.currentInterval=60;
    }else if(updatesPerSec<20&&this.avgRenderTime<5){
      this.currentInterval=20;
    }else{
      this.currentInterval=30;
    }
    
    this.updateCount=0;
    this.windowStart=now;
  }
  
  recordRenderTime(time){
    this.renderSamples.push(time);
    if(this.renderSamples.length>10)this.renderSamples.shift();
    this.avgRenderTime=this.renderSamples.reduce((a,b)=>a+b,0)/this.renderSamples.length;
  }

  flushPending(force=false){
    if(!this.hasPending&&!force)return;
    if(this.rafId){
      cancelAnimationFrame(this.rafId);
      this.rafId=null;
    }
    if(this.timeoutId){
      clearTimeout(this.timeoutId);
      this.timeoutId=null;
    }
    this.flush();
  }

  stop(){
    if(this.rafId){
      cancelAnimationFrame(this.rafId);
      this.rafId=null;
    }
    if(this.timeoutId){
      clearTimeout(this.timeoutId);
      this.timeoutId=null;
    }
  }
}

// ===== LeakSafeObserverManager =====
class LeakSafeObserverManager{
  constructor(){
    this.observers=new Map();
    this.observedElements=new WeakMap();
  }
  
  create(type,container,callback,options){
    this.cleanup(type);
    const observer=new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.target.isConnected){
          observer.unobserve(entry.target);
          return;
        }
        callback(entry);
      });
    },{root:container,...options});
    
    this.observers.set(type,{observer,container,elements:new Set()});
    return observer;
  }
  
  observe(type,element){
    const data=this.observers.get(type);
    if(!data)return;
    data.observer.observe(element);
    data.elements.add(element);
    this.observedElements.set(element,type);
  }
  
  unobserve(type,element){
    const data=this.observers.get(type);
    if(!data)return;
    try{
      data.observer.unobserve(element);
      data.elements.delete(element);
    }catch{}
  }
  
  cleanup(type){
    const data=this.observers.get(type);
    if(!data)return;
    data.elements.forEach(el=>{
      try{data.observer.unobserve(el);}catch{}
    });
    try{data.observer.disconnect();}catch{}
    data.elements.clear();
    this.observers.delete(type);
  }
  
  cleanupAll(){
    for(const type of this.observers.keys()){
      this.cleanup(type);
    }
  }
}

// ===== DOMPool - 改进子元素复用 =====
class DOMPool{
  constructor(){
    this.pools=new Map();
    this.maxPoolSize=50;
  }
  
  acquire(tagName,className){
    const pool=this.pools.get(tagName);
    if(pool&&pool.length>0){
      const el=pool.pop();
      el.className=className;
      return el;
    }
    const el=document.createElement(tagName);
    el.className=className;
    return el;
  }
  
  release(tagName,element){
    if(!element)return;
    if(!this.pools.has(tagName))this.pools.set(tagName,[]);
    const pool=this.pools.get(tagName);
    if(pool.length<this.maxPoolSize){
      element.className='';
      element.removeAttribute('data-id');
      // 注意：不清空innerHTML，让buildMessageElement复用子元素
      pool.push(element);
    }
  }
  
  clear(){
    this.pools.clear();
  }
}

// ===== RegexProcessor =====
class RegexProcessor{
  compileRules(rules){
if (!Array.isArray(rules) || rules.length === 0) return null;

const compiled = [];
for (const rule of rules) {
  if (!rule || !rule.pattern) continue;
  try {
    let source = rule.pattern;
    let flags = '';

    // 允许用户写 JS 字面量：/pattern/flags
    // 若不是字面量，兼容旧字段 rule.flags，但不再强加任何 flag
    if (typeof source === 'string') {
      const m = source.match(/^\/([\s\S]*)\/([a-z]*)$/i);
      if (m) {
        source = m[1];
        flags = m[2] || '';
      } else if (rule.flags) {
        flags = String(rule.flags || '');
      }
    }

    const regex = new RegExp(source, flags);
    compiled.push({ regex, replacement: (rule.replacement ?? '') });
  } catch (e) {
    // 单条无效规则忽略
  }
}
return compiled.length ? compiled : null;
}

process(text,compiledRules){
    if(!text||!compiledRules)return text;
    let result=text;
    for(const rule of compiledRules){
      try{
        result=result.replace(rule.regex,rule.replacement);
      }catch(e){}
    }
    return result;
  }
}

// ===== EventHub - 添加passive支持 =====
class EventHub{
  constructor(){
    this.listeners=new WeakMap();
    this.unbinders=[];
    this.timeouts=new Set();
    this.intervals=new Set();
  }
  
  on(el,type,handler,opts){
    if(!el)return ()=>{};
    
    // ✅ 自动为滚动事件添加passive
    if(opts===undefined&&['scroll','wheel','touchmove','touchstart'].includes(type)){
      opts={passive:true};
    }
    
    el.addEventListener(type,handler,opts);
    if(!this.listeners.has(el))this.listeners.set(el,new Set());
    this.listeners.get(el).add({type,handler,opts});
    
    const off=()=>{
      try{
        el.removeEventListener(type,handler,opts);
        const set=this.listeners.get(el);
        if(set){
          for(const item of set){
            if(item.type===type&&item.handler===handler){
              set.delete(item);
              break;
            }
          }
          if(set.size===0)this.listeners.delete(el);
        }
      }catch{}
    };
    this.unbinders.push(off);
    return off;
  }
  
  setTimeout(fn,delay){
    const id=window.setTimeout(()=>{
      this.timeouts.delete(id);
      try{fn();}catch{}
    },delay);
    this.timeouts.add(id);
    return id;
  }
  
  clearTimeout(id){
    if(this.timeouts.has(id)){
      clearTimeout(id);
      this.timeouts.delete(id);
    }
  }
  
  setInterval(fn,delay){
    const id=window.setInterval(fn,delay);
    this.intervals.add(id);
    return id;
  }
  
  clearInterval(id){
    if(this.intervals.has(id)){
      clearInterval(id);
      this.intervals.delete(id);
    }
  }
  
  cleanup(){
    const unbinders=[...this.unbinders];
    const timeouts=new Set(this.timeouts);
    const intervals=new Set(this.intervals);
    
    this.unbinders=[];
    this.timeouts.clear();
    this.intervals.clear();
    
    unbinders.forEach(off=>{try{off();}catch{}});
    timeouts.forEach(id=>{try{clearTimeout(id);}catch{}});
    intervals.forEach(id=>{try{clearInterval(id);}catch{}});
  }
}

// ===== Utils =====
const Utils={
  $:(selector)=>document.querySelector(selector),
  $$:(selector)=>Array.from(document.querySelectorAll(selector)),
  
  debounce(fn,delay=CONFIG.DEBOUNCE_DELAY){
    let timer;
    return(...args)=>{
      clearTimeout(timer);
      timer=setTimeout(()=>fn(...args),delay);
    };
  },
  
  throttle(fn,wait=CONFIG.THROTTLE_DELAY){
    let last=0,timer=null,lastArgs=null;
    return function throttled(...args){
      const now=Date.now();
      const remaining=wait-(now-last);
      lastArgs=args;
      if(remaining<=0){
        last=now;
        if(timer){
          clearTimeout(timer);
          timer=null;
        }
        return fn.apply(this,args);
      }
      if(!timer){
        timer=setTimeout(()=>{
          last=Date.now();
          timer=null;
          fn.apply(this,lastArgs);
        },remaining);
      }
    };
  },
  
  rafThrottle(fn){
    let ticking=false,lastArgs=null,ctx=null;
    return function(...args){
      lastArgs=args;
      ctx=this;
      if(!ticking){
        ticking=true;
        requestAnimationFrame(()=>{
          ticking=false;
          try{fn.apply(ctx,lastArgs);}catch{}
        });
      }
    };
  },
  
  numOrNull(value){
    if(value===''||value==null)return null;
    const n=Number(value);
    return Number.isFinite(n)?n:null;
  },
  
  intOrNull(value){
    if(value===''||value==null)return null;
    const n=parseInt(value,10);
    return Number.isFinite(n)?n:null;
  },
  
  scheduleIdleTask(fn,options={}){
    if('requestIdleCallback'in window)
      return requestIdleCallback(fn,{timeout:CONFIG.IDLE_TIMEOUT,...options});
    else
      return setTimeout(fn,0);
  },
  
  cancelIdleTask(id){
    if(id==null)return;
    if('cancelIdleCallback'in window)cancelIdleCallback(id);
    else clearTimeout(id);
  }
};

// ===== StorageManager - ✅ IndexedDB版本：更大容量更好性能 =====
class StorageManager{
  static _db=null;
  static _dbName='chatAppDB';
  static _dbVersion=1;
  static _storeName='chatData';
  static _queue=new Map();
  static _initPromise=null;
  static _messagesObserver=null;
  static _messagesObserverTarget=null;
  static _messagesObserverHandler=null;
  static _sessionCache=null;
  static _legacySnapshot=null;
  static _legacySnapshotWritable=false;
  static _signatureCache=typeof WeakMap==='function'?new WeakMap():null;

  static _getSignatureVersion(msg){
    return (msg&&typeof msg==='object'&&Number.isInteger(msg.__sigVersion))?msg.__sigVersion:0;
  }

  static bumpMessageSignature(msg){
    if(!msg||typeof msg!=='object')return;
    const next=this._getSignatureVersion(msg)+1;
    try{
      Object.defineProperty(msg,'__sigVersion',{
        value:next,
        writable:true,
        configurable:true
      });
    }catch(_){
      msg.__sigVersion=next;
    }
    this._signatureCache?.delete(msg);
  }

  static registerMessagesObserverHandler(handler){
    this._messagesObserverHandler=typeof handler==='function'?handler:null;
    if(this._messagesObserverHandler){
      this._ensureMessagesObserver();
    }else{
      this._teardownMessagesObserver();
    }
  }

  static _ensureMessagesObserver(){
    if(!this._messagesObserverHandler){
      this._teardownMessagesObserver();
      return;
    }
    const box=Utils.$('#messages');
    if(!box){
      this._teardownMessagesObserver();
      return;
    }

    if(!this._messagesObserver){
      this._messagesObserver=new MutationObserver((muts)=>{
        if(!this._messagesObserverHandler)return;
        for(const m of muts){
          for(const n of m.addedNodes||[]){
            if(n&&n.nodeType===1&&n.classList&&n.classList.contains('msg')){
              try{ this._messagesObserverHandler(n); }catch{}
            }
          }
        }
      });
    }

    if(this._messagesObserverTarget!==box){
      try{ this._messagesObserver.disconnect(); }catch{}
      try{ this._messagesObserver.observe(box,{childList:true}); }catch{}
      this._messagesObserverTarget=box;
    }
  }

  static _teardownMessagesObserver(){
    if(this._messagesObserver){
      try{ this._messagesObserver.disconnect(); }catch{}
    }
    this._messagesObserverTarget=null;
  }

  static async init(){
    this._ensureMessagesObserver();
    if(this._db)return this._db;
    if(this._initPromise)return this._initPromise;
    
    this._initPromise=new Promise((resolve,reject)=>{
      const request=indexedDB.open(this._dbName,this._dbVersion);
      
      request.onerror=()=>reject(request.error);
      request.onsuccess=()=>{
        this._db=request.result;
        resolve(this._db);
      };
      
      request.onupgradeneeded=(e)=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains(this._storeName)){
          db.createObjectStore(this._storeName);
        }
      };
    });
    
    return this._initPromise;
  }
  
  static async load(key,fallback){
    try{
      await this.init();
      
      return new Promise((resolve)=>{
        const tx=this._db.transaction([this._storeName],'readonly');
        const store=tx.objectStore(this._storeName);
        const request=store.get(key);
        
        request.onsuccess=()=>{
          const value=request.result;
          resolve(value!==undefined?value:fallback);
        };
        
        request.onerror=()=>resolve(fallback);
      });
    }catch(e){
      console.error('IndexedDB load error:',e);
      return fallback;
    }
  }
  
  static async save(key,value){
    const existing=this._queue.get(key);
    if(existing&&existing.handle!=null){
      Utils.cancelIdleTask(existing.handle);
    }

    return new Promise((resolve)=>{
      const handle=Utils.scheduleIdleTask(async()=>{
        try{
          await this._executeWrite(key,value);
        }catch(e){
          console.error('IndexedDB scheduled write error:',e);
        }finally{
          this._queue.delete(key);
          resolve();
        }
      },{timeout:CONFIG.IDLE_TIMEOUT});
      this._queue.set(key,{value,handle});
    });
  }
  
  static async _executeWrite(key,value){
    try{
      await this.init();
      
      return new Promise((resolve,reject)=>{
        const tx=this._db.transaction([this._storeName],'readwrite');
        const store=tx.objectStore(this._storeName);
        const request=store.put(value,key);
        
        request.onsuccess=()=>resolve(true);
        request.onerror=()=>reject(request.error);
      });
    }catch(e){
      console.error('IndexedDB write error:',e);
      if(e.name==='QuotaExceededError'){
        ErrorHandler.show('存储空间已满，请导出备份后清理数据',5000);
      }else{
        ErrorHandler.show('数据保存失败: '+e.message,4000);
      }
      return false;
    }
  }
  
  static async flush(){
    const promises=[];
    for(const[key,item]of this._queue){
      if(item.handle!=null)Utils.cancelIdleTask(item.handle);
      promises.push(this._executeWrite(key,item.value));
    }
    this._queue.clear();
    return Promise.all(promises);
  }

  static _clone(value){
    try{
      if(typeof structuredClone==='function')return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }catch(_){
      try{
        return JSON.parse(JSON.stringify(value));
      }catch(__){
        return value;
      }
    }
  }

  static _sessionIndexKey(){
    return CONFIG.STORAGE_KEYS.sessionIndex||'chat.sessions.index';
  }

  static _legacySnapshotMode(){
    return (CONFIG.STORAGE_LEGACY&&CONFIG.STORAGE_LEGACY.sessionsSnapshot)||'migration';
  }

  static _shouldWriteLegacySnapshot(){
    const mode=this._legacySnapshotMode();
    if(mode==='always')return true;
    if(mode==='migration')return this._legacySnapshotWritable;
    return false;
  }

  static async _finalizeLegacySnapshotMigration(){
    if(this._legacySnapshotMode()!=='migration')return;
    this._legacySnapshotWritable=false;
    await this._executeDelete(CONFIG.STORAGE_KEYS.sessions);
  }

  static _sessionKey(id){
    return (CONFIG.STORAGE_KEYS.sessionPrefix||'chat.session.')+id;
  }

  static _computeSessionMetaHash(session){
    if(!session)return'';
    const meta={};
    for(const key in session){
      if(key==='history')continue;
      meta[key]=session[key];
    }
    try{
      return JSON.stringify(meta);
    }catch(_){
      return String(Date.now())+Math.random().toString(16).slice(2);
    }
  }

  static _messageSignature(msg){
    if(!msg||typeof msg!=='object')return String(msg??'');
    const version=this._getSignatureVersion(msg);
    const cached=this._signatureCache?.get(msg);
    if(cached&&cached.version===version)return cached.sig;
    const keys=Object.keys(msg).filter(k=>k!=='id'&&k!=='__sigVersion').sort();
    let sig=msg.id||'';
    for(const key of keys){
      const value=msg[key];
      if(value&&typeof value==='object'){
        try{ sig+=`|${key}:${JSON.stringify(value)}`; }
        catch(_){ sig+=`|${key}:[object]`; }
      }else{
        sig+=`|${key}:${String(value)}`;
      }
    }
    this._signatureCache?.set(msg,{version,sig});
    return sig;
  }

  static _cloneMessage(msg){
    if(!msg||typeof msg!=='object')return msg;
    return this._clone(msg);
  }

  static _applySessionMeta(target,source){
    if(!target||typeof target!=='object')return;
    if(!source||typeof source!=='object'){
      for(const key in target){
        if(key==='history')continue;
        delete target[key];
      }
      return;
    }

    for(const key in target){
      if(key==='history')continue;
      if(!(key in source))delete target[key];
    }

    for(const key in source){
      if(key==='history')continue;
      const value=source[key];
      if(value&&typeof value==='object')target[key]=this._clone(value);
      else target[key]=value;
    }
  }

  static _createCacheEntry(session){
    const base={};
    if(session&&typeof session==='object'){
      this._applySessionMeta(base,session);
    }
    const srcHistory=Array.isArray(session?.history)?session.history:[];
    const history=base.history=[];
    const signatures=new Map();
    for(let i=0;i<srcHistory.length;i++){
      const msg=srcHistory[i];
      const cloned=this._cloneMessage(msg);
      history.push(cloned);
      const key=(cloned&&cloned.id)?cloned.id:`__idx_${i}`;
      signatures.set(key,this._messageSignature(msg));
    }
    return{
      data:base,
      metaHash:this._computeSessionMetaHash(session),
      historyLength:history.length,
      signatures
    };
  }

  static _materializeLegacySessions(){
    const out={};
    if(!this._sessionCache)return out;
    for(const[id,entry]of this._sessionCache.entries()){
      out[id]=entry.data;
    }
    return out;
  }

  static seedSessionsCache(sessions){
    this._sessionCache=new Map();
    this._legacySnapshot={};
    const source=sessions||{};
    Object.keys(source).forEach(id=>{
      const entry=this._createCacheEntry(source[id]);
      this._sessionCache.set(id,entry);
      this._legacySnapshot[id]=entry.data;
    });
  }

  static async _executeDelete(key){
    try{
      await this.init();

      return new Promise((resolve,reject)=>{
        const tx=this._db.transaction([this._storeName],'readwrite');
        const store=tx.objectStore(this._storeName);
        const request=store.delete(key);

        request.onsuccess=()=>resolve(true);
        request.onerror=()=>reject(request.error);
      });
    }catch(e){
      console.error('IndexedDB delete error:',e);
      return false;
    }
  }

  static async loadSessions(fallback={}){
    const indexKey=this._sessionIndexKey();
    const index=await this.load(indexKey,null);

    if(Array.isArray(index)&&index.length){
      this._legacySnapshotWritable=false;
      if(this._legacySnapshotMode()==='migration'){
        await this._executeDelete(CONFIG.STORAGE_KEYS.sessions);
      }
      const entries=await Promise.all(index.map(async id=>{
        const data=await this.load(this._sessionKey(id),undefined);
        return[data,id];
      }));

      const sessions={};
      entries.forEach(([data,id])=>{
        if(data!==undefined)sessions[id]=data;
      });
      this.seedSessionsCache(sessions);
      return sessions;
    }

    const legacy=await this.load(CONFIG.STORAGE_KEYS.sessions,fallback);
    this.seedSessionsCache(legacy);
    if(legacy&&Object.keys(legacy).length){
      this._legacySnapshotWritable=true;
      await this.saveSessionsSnapshot(legacy);
      await this._finalizeLegacySnapshotMigration();
    }
    return legacy||fallback;
  }

  static async saveSessionsSnapshot(allSessions){
    const previousIds=new Set(this._sessionCache?this._sessionCache.keys():[]);
    const ids=Object.keys(allSessions||{});
    const indexKey=this._sessionIndexKey();
    const nextCache=new Map();
    const legacySnapshot={};

    const writePromises=ids.map(id=>{
      const entry=this._createCacheEntry(allSessions[id]);
      nextCache.set(id,entry);
      legacySnapshot[id]=entry.data;
      previousIds.delete(id);
      return this.save(this._sessionKey(id),entry.data);
    });

    const deletePromises=[];
    previousIds.forEach(id=>{
      deletePromises.push(this._executeDelete(this._sessionKey(id)));
    });

    this._sessionCache=nextCache;
    this._legacySnapshot=legacySnapshot;

    writePromises.push(this.save(indexKey,ids));
    if(this._shouldWriteLegacySnapshot()){
      writePromises.push(this.save(CONFIG.STORAGE_KEYS.sessions,this._legacySnapshot));
    }

    return Promise.all([...writePromises,...deletePromises]);
  }

  static async saveSessionsPartial(allSessions,dirtyIds=new Set(),removedIds=new Set()){
    if(!this._sessionCache){
      const loaded=await this.loadSessions({});
      this.seedSessionsCache(loaded);
    }

    const writes=[];
    let changed=false;
    if(!this._legacySnapshot)this._legacySnapshot={};
    const legacySnapshot=this._legacySnapshot;

    dirtyIds.forEach(id=>{
      if(id==null)return;
      if(!allSessions||!(id in allSessions))return;
      const session=allSessions[id];
      let entry=this._sessionCache.get(id);
      if(!entry){
        entry=this._createCacheEntry(session);
        this._sessionCache.set(id,entry);
        legacySnapshot[id]=entry.data;
        writes.push(this.save(this._sessionKey(id),entry.data));
        changed=true;
        return;
      }

      const metaHash=this._computeSessionMetaHash(session);
      let entryChanged=false;
      if(metaHash!==entry.metaHash){
        entry.metaHash=metaHash;
        this._applySessionMeta(entry.data,session);
        entryChanged=true;
      }

      const historyChanged=this._syncSessionHistory(entry,session);
      if(entryChanged||historyChanged){
        writes.push(this.save(this._sessionKey(id),entry.data));
        changed=true;
      }
      legacySnapshot[id]=entry.data;
    });

    removedIds.forEach(id=>{
      if(id==null)return;
      if(this._sessionCache&&this._sessionCache.has(id)){
        this._sessionCache.delete(id);
        delete legacySnapshot[id];
        writes.push(this._executeDelete(this._sessionKey(id)));
        changed=true;
      }
    });

    if(!changed)return Promise.resolve();
    writes.push(this.save(this._sessionIndexKey(),Array.from(this._sessionCache.keys())));
    if(this._shouldWriteLegacySnapshot()){
      writes.push(this.save(CONFIG.STORAGE_KEYS.sessions,legacySnapshot));
    }
    return Promise.all(writes);
  }

  static _syncSessionHistory(entry,session){
    const sourceHistory=Array.isArray(session?.history)?session.history:[];
    const cachedHistory=Array.isArray(entry.data.history)?entry.data.history:(entry.data.history=[]);
    const prevSignatures=entry.signatures||new Map();
    const nextSignatures=new Map();
    const sourceLength=sourceHistory.length;
    const prevLength=Number.isInteger(entry.historyLength)?entry.historyLength:cachedHistory.length;
    const signatureCache=new Array(sourceLength);
    let changed=false;
    let divergeIndex=-1;

    const getSignature=(index,msg)=>{
      if(signatureCache[index]!==undefined)return signatureCache[index];
      const sig=this._messageSignature(msg);
      signatureCache[index]=sig;
      return sig;
    };

    let canAppend=sourceLength>=prevLength;
    if(canAppend){
      for(let i=0;i<prevLength;i++){
        const srcMsg=sourceHistory[i];
        const cachedMsg=cachedHistory[i];
        const msgId=srcMsg?.id?srcMsg.id:`__idx_${i}`;
        if(!cachedMsg||cachedMsg.id!==srcMsg?.id){
          canAppend=false;
          divergeIndex=i;
          break;
        }
        const sig=getSignature(i,srcMsg);
        if(prevSignatures.get(msgId)!==sig){
          canAppend=false;
          break;
        }
        nextSignatures.set(msgId,prevSignatures.get(msgId)??sig);
      }
    }

    if(canAppend){
      if(cachedHistory.length>prevLength){
        cachedHistory.splice(prevLength);
        changed=true;
      }
      for(let i=prevLength;i<sourceLength;i++){
        const msg=sourceHistory[i];
        const cloned=this._cloneMessage(msg);
        cachedHistory.push(cloned);
        const key=msg?.id?msg.id:`__idx_${i}`;
        nextSignatures.set(key,getSignature(i,msg));
        changed=true;
      }
      if(sourceLength===0){
        nextSignatures.clear();
      }
      entry.signatures=nextSignatures;
      entry.historyLength=sourceLength;
      return changed;
    }

    for(let i=0;i<sourceLength;i++){
      const srcMsg=sourceHistory[i];
      const cachedMsg=cachedHistory[i];
      const msgId=srcMsg?.id?srcMsg.id:`__idx_${i}`;
      if(!cachedMsg||cachedMsg.id!==srcMsg?.id){
        if(divergeIndex===-1)divergeIndex=i;
        break;
      }
      const sig=getSignature(i,srcMsg);
      nextSignatures.set(msgId,sig);
      if(prevSignatures.get(msgId)!==sig){
        cachedHistory[i]=this._cloneMessage(srcMsg);
        changed=true;
      }
    }

    if(divergeIndex!==-1){
      cachedHistory.splice(divergeIndex);
      for(let j=divergeIndex;j<sourceLength;j++){
        const msg=sourceHistory[j];
        const cloned=this._cloneMessage(msg);
        cachedHistory.push(cloned);
        const key=msg?.id?msg.id:`__idx_${j}`;
        nextSignatures.set(key,getSignature(j,msg));
      }
      changed=true;
    }

    if(cachedHistory.length>sourceLength){
      cachedHistory.splice(sourceLength);
      changed=true;
    }

    if(cachedHistory.length<sourceLength){
      for(let k=cachedHistory.length;k<sourceLength;k++){
        const msg=sourceHistory[k];
        const cloned=this._cloneMessage(msg);
        cachedHistory.push(cloned);
        const key=msg?.id?msg.id:`__idx_${k}`;
        nextSignatures.set(key,getSignature(k,msg));
      }
      changed=true;
    }

    if(sourceLength===0){
      nextSignatures.clear();
    }

    entry.signatures=nextSignatures;
    entry.historyLength=sourceLength;
    return changed;
  }
}

// ===== ErrorHandler =====
class ErrorHandler{
  static show(message,duration=3000){
    const existing=document.querySelectorAll('.error-toast');
    if(existing.length>=3)return;
    
    const recentToasts=Array.from(existing).filter(t=>t.textContent===message);
    if(recentToasts.length>0)return;
    
    const toast=document.createElement('div');
    toast.className='error-toast';
    toast.textContent=message;
    document.body.appendChild(toast);
    
    setTimeout(()=>{
      toast.classList.add('hide');
      setTimeout(()=>toast.remove(),300);
    },duration);
  }
}

// ===== DOMManager - 添加self-heal =====
class DOMManager{
  constructor(){
    this.elements=new Map();
    this.updateQueue=[];
    this.isFlushScheduled=false;
    this.cleanupTimer=null;
    this.cachedElements={
      messages:null,
      input:null,
      send:null,
      sidebar:null,
      backdrop:null,
      btnSessions:null,
      btnSettings:null,
      btnNew:null,
      composerModelSelector:null,
      newChatModelSelector:null
    };
  }
  
  get(selector){
    let el=this.elements.get(selector);
    if(!el||!el.isConnected){
      el=Utils.$(selector);
      this.elements.set(selector,el);
    }
    return el;
  }
  
  // ✅ Self-heal: 自动重新查询断开的元素
  getCached(key){
    const el=this.cachedElements[key];
    if(!el||!el.isConnected){
      const selector=this._getSelectorForKey(key);
      const fresh=selector?Utils.$(selector):null;
      this.cachedElements[key]=fresh;
      return fresh;
    }
    return el;
  }
  
  _getSelectorForKey(key){
    const map={
      messages:'#messages',
      input:'#input',
      send:'#send',
      sidebar:'#sidebar',
      backdrop:'#backdrop',
      btnSessions:'#btnSessions',
      btnSettings:'#btnSettings',
      btnNew:'#btnNew',
      composerModelSelector:'#composerModelSelector',
      newChatModelSelector:'#newChatModelSelector'
    };
    return map[key];
  }
  
  invalidate(selector){
    this.elements.delete(selector);
  }
  
  batchUpdate(fn){
    this.updateQueue.push(fn);
    if(!this.isFlushScheduled){
      this.isFlushScheduled=true;
      queueMicrotask(()=>this.flushUpdates());
    }
  }
  
  flushUpdates(){
    this.updateQueue.forEach(fn=>{
      try{fn();}catch{}
    });
    this.updateQueue=[];
    this.isFlushScheduled=false;
  }
  
  cleanupDisconnected(){
    for(const[key,el]of this.elements.entries()){
      if(el&&!el.isConnected){
        this.elements.delete(key);
      }
    }
  }
  
  startAutoCleanup(){
    this.stopAutoCleanup();
    this.cleanupTimer=setInterval(()=>this.cleanupDisconnected(),180000);
  }
  
  stopAutoCleanup(){
    if(this.cleanupTimer){
      clearInterval(this.cleanupTimer);
      this.cleanupTimer=null;
    }
  }
  
  clear(){
    this.stopAutoCleanup();
    this.elements.clear();
    for(const key in this.cachedElements){
      this.cachedElements[key]=null;
    }
  }
}

// ===== StateManager =====
class StateManager{
  constructor(){
    this.state={
      modelPresets:[
        {enabled:true,name:'GPT-4',type:'openai',config:{
          base:'https://api.openai.com/v1',key:'',model:'gpt-4o-mini',
          temperature:1,top_p:0.95,max_tokens:65536,stream:false
        }},
        {enabled:true,name:'DeepSeek',type:'deepseek',config:{
          base:'https://api.deepseek.com/beta',key:'',model:'deepseek-reasoner',
          temperature:1,top_p:0.95,max_tokens:65536,stream:false
        }}
      ],
      sessions:{},
      currentId:null,
      promptPresets:{
        'default':{name:'默认预设',sysPrompt:'',firstUser:'',firstAssistant:'',
          messagePrefix:'',assistantPrefill:'',regexRules:[]}
      },
      currentModelIndex:0,
      editingPromptPreset:null
    };
    this.saveTimer=null;
    this.pendingSaves=new Set();
    this.initialized=false;
    this.dirtySessions=new Set();
    this.removedSessions=new Set();
    this.sessionsDirtyAll=false;
  }
  
  async init(){
    if(this.initialized)return;
    
    // 异步加载所有数据
    const [modelPresets,sessions,currentId,promptPresets]=await Promise.all([
      StorageManager.load(CONFIG.STORAGE_KEYS.modelPresets,this.state.modelPresets),
      StorageManager.loadSessions(this.state.sessions),
      StorageManager.load(CONFIG.STORAGE_KEYS.currentId,this.state.currentId),
      StorageManager.load(CONFIG.STORAGE_KEYS.promptPresets,this.state.promptPresets)
    ]);
    
    this.state.modelPresets=modelPresets;
    this.state.sessions=sessions;
    this.state.currentId=currentId;
    this.state.promptPresets=promptPresets;

    StorageManager.seedSessionsCache(this.state.sessions);
    this.initialized=true;
  }

  get(key){
    return this.state[key];
  }

  set(key,value){
    if(key==='sessions'){
      if(value!==this.state.sessions){
        this.state.sessions=value;
        this.sessionsDirtyAll=true;
      }
      this.pendingSaves.add(key);
      this.debounceSave();
      return;
    }

    this.state[key]=value;
    this.pendingSaves.add(key);
    this.debounceSave();
  }

  markSessionsDirty(sessionIds){
    if(!sessionIds)return;
    const ids=Array.isArray(sessionIds)?sessionIds:[sessionIds];
    ids.forEach(id=>{ if(id) this.dirtySessions.add(id); });
    if(ids.length>0)this.pendingSaves.add('sessions');
    this.debounceSave();
  }

  markSessionRemoved(sessionId){
    if(!sessionId)return;
    this.removedSessions.add(sessionId);
    this.pendingSaves.add('sessions');
    this.debounceSave();
  }

  debounceSave(){
    clearTimeout(this.saveTimer);
    this.saveTimer=setTimeout(()=>this.flushPendingSaves(),CONFIG.PERSIST_DELAY);
  }

  forceSave(){
    clearTimeout(this.saveTimer);
    this.flushPendingSaves(true);
  }

  flushPendingSaves(forceFullSessions=false){
    const keys=[...this.pendingSaves];
    this.pendingSaves.clear();

    keys.forEach(key=>{
      if(key==='sessions'){
        if(this.sessionsDirtyAll||forceFullSessions){
          StorageManager.saveSessionsSnapshot(this.state.sessions);
        }else{
          StorageManager.saveSessionsPartial(this.state.sessions,this.dirtySessions,this.removedSessions);
        }
        this.dirtySessions.clear();
        this.removedSessions.clear();
        this.sessionsDirtyAll=false;
      }else{
        const storageKey=CONFIG.STORAGE_KEYS[key];
        if(storageKey)StorageManager.save(storageKey,this.state[key]);
      }
    });
  }
  
  getActiveSession(){
    return this.state.sessions[this.state.currentId];
  }
  
  getActivePresets(){
    return this.state.modelPresets.filter(p=>p.enabled);
  }
  
  getCurrentPreset(){
    const presets=this.getActivePresets();
    return presets[this.state.currentModelIndex]||presets[0];
  }
  
  getCurrentPromptConfig(){
    // 返回default预设作为后备
    return this.state.promptPresets['default']||
      {sysPrompt:'',firstUser:'',firstAssistant:'',messagePrefix:'',assistantPrefill:'',regexRules:[]};
  }
  
  getSessionPromptConfig(session){
    if(!session)return this.getCurrentPromptConfig();
    const presetName=session.promptPresetName||'default';
    return this.state.promptPresets[presetName]||
      this.state.promptPresets['default']||
      {sysPrompt:'',firstUser:'',firstAssistant:'',messagePrefix:'',assistantPrefill:'',regexRules:[]};
  }
}

// ===== MessageWindowManager =====
class MessageWindowManager{
  constructor(){
    this.window={enabled:false,start:0,end:-1,total:0};
  }
  
  evaluate(total){
    if(total>CONFIG.MSG_VLIST_THRESHOLD){
      this.window.enabled=true;
      this.window.total=total;
      this.window.end=total-1;
      this.window.start=Math.max(0,total-CONFIG.MSG_WINDOW_TAIL-CONFIG.MSG_WINDOW_BUFFER);
    }else{
      this.window.enabled=false;
      this.window.total=total;
      this.window.start=0;
      this.window.end=total-1;
    }
  }
  
  loadEarlier(){
    if(!this.window.enabled||this.window.start===0)return null;
    const newStart=Math.max(0,this.window.start-CONFIG.MSG_LOAD_CHUNK);
    const oldStart=this.window.start;
    this.window.start=newStart;
    return{newStart,oldStart};
  }
  
  appendNew(total,isNearBottom=true){
    if(this.window.enabled){
      this.window.total=total;
      this.window.end=total-1;
      if(isNearBottom){
        this.window.start=Math.max(0,total-CONFIG.MSG_WINDOW_TAIL-CONFIG.MSG_WINDOW_BUFFER);
      }
    }else{
      this.window.total=total;
      this.window.end=total-1;
    }
  }
}

// ===== APIManager =====
class APIManager{
  constructor(state){
    this.state=state;
    this.abortController=null;
    this.activeReader=null;
  }
  
  buildMessages(session,options={}){
    const{isDeepSeek=false,isKimi=false}=options||{};
    const msgs=[];
    const pc=this.state.getSessionPromptConfig(session);
    
    if(pc.sysPrompt)msgs.push({role:'system',content:pc.sysPrompt});
    if(pc.firstUser)msgs.push({role:'user',content:pc.firstUser});
    
    const history=session.history||[];
    history.forEach((m,i)=>{
      if(m.role==='user'||m.role==='assistant'){
        const isLastUser=m.role==='user'&&i===history.length-1;
        const content=(isLastUser&&pc.messagePrefix)?pc.messagePrefix+m.content:m.content;
        msgs.push({role:m.role,content});
      }
    });
    
    if(pc.assistantPrefill){
      const assistantMsg={role:'assistant',content:pc.assistantPrefill};
      if(isDeepSeek)assistantMsg.prefix=true;
      if(isKimi)assistantMsg.partial=true;
      msgs.push(assistantMsg);
    }
    
    return msgs;
  }

  buildAnthropicMessages(session){
    const pc=this.state.getSessionPromptConfig(session);
    const messages=[];
    const system=pc.sysPrompt||'';

    if(pc.firstUser){
      messages.push({role:'user',content:[{type:'text',text:pc.firstUser}]});
    }

    const history=session.history||[];
    history.forEach((m,i)=>{
      if(m.role==='user'||m.role==='assistant'){
        const isLastUser=m.role==='user'&&i===history.length-1;
        const contentText=(isLastUser&&pc.messagePrefix)?pc.messagePrefix+m.content:m.content;
        messages.push({role:m.role,content:[{type:'text',text:contentText}]});
      }
    });

    if(pc.assistantPrefill){
      messages.push({role:'assistant',content:[{type:'text',text:pc.assistantPrefill}]});
    }

    return{messages,system};
  }
  
  async send(session,onDelta){
    const preset=this.state.getCurrentPreset();
    if(!preset)throw new Error('无可用模型预设');

    this.abortController=new AbortController();
    this.activeReader=null;
    const signal=this.abortController.signal;

    if(preset.type==='anthropic'){
      return await this.sendAnthropic(session,preset.config,onDelta,signal);
    }
    if(preset.type==='openai'||preset.type==='deepseek'||preset.type==='kimi'){
      return await this.sendOpenAI(session,preset.config,onDelta,signal,preset.type==='deepseek',preset.type==='kimi');
    }else{
      return await this.sendGemini(session,preset.config,preset.type==='gemini-proxy',onDelta,signal);
    }
  }

  async sendOpenAI(session,cfg,onDelta,signal,forceDeepSeek=false,forceKimi=false){
    const isDeepSeek=forceDeepSeek||((cfg.base||'').includes('api.deepseek.com'));
    const isKimi=forceKimi||((cfg.base||'').includes('api.moonshot.cn'));
    let baseDefault='https://api.openai.com/v1';
    let modelDefault='gpt-4o-mini';
    if(isDeepSeek){
      baseDefault='https://api.deepseek.com/beta';
      modelDefault='deepseek-reasoner';
    }else if(isKimi){
      baseDefault='https://api.moonshot.cn/v1';
      modelDefault='kimi-k2-0905-preview';
    }
    const url=(cfg.base||baseDefault).replace(/\/+$/,'')+'/chat/completions';
    const requestThinking=!!cfg.useThinking;
    const isClaudeCompatible=/claude/i.test(cfg.model||'')||/anthropic/i.test(cfg.base||'');
    const extractContentParts=(parts)=>{
      let text='',thinking='';
      for(const part of parts||[]){
        const type=part?.type||'';
        if(type==='text'||type==='output_text'||type===''){
          if(part?.text)text+=part.text;
        }else if(type==='thinking'||type==='reasoning'){
          if(part?.thinking)thinking+=part.thinking;
          else if(part?.text)thinking+=part.text;
        }
      }
      return{text,thinking};
    };
    const body={
      model:cfg.model||modelDefault,
      messages:this.buildMessages(session,{isDeepSeek,isKimi}),
      stream:!!cfg.stream
    };
    
    if(cfg.temperature!=null&&cfg.temperature!==0)body.temperature=cfg.temperature;
    if(cfg.top_p!=null&&cfg.top_p!==0)body.top_p=cfg.top_p;
    if(cfg.max_tokens!=null&&cfg.max_tokens!==0)body.max_tokens=cfg.max_tokens;
    
    // ✅ 添加思维链支持 - 只有在启用时才发送
    if(requestThinking&&!isClaudeCompatible&&cfg.thinkingEffort){
      body.reasoning_effort=cfg.thinkingEffort;
    }else if(requestThinking&&!isClaudeCompatible){
      // 启用但未指定级别，使用medium作为默认值
      body.reasoning_effort='medium';
    }
    
    const res=await fetch(url,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${cfg.key}`
      },
      body:JSON.stringify(body),
      signal
    });
    
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    
    if(cfg.stream){
      const reader=res.body.getReader();
      this.activeReader=reader;
      const decoder=new TextDecoder();
      let buffer='',full='',thinking='';

      try{
        while(true){
          const{done,value}=await reader.read();
          if(done)break;
          buffer+=decoder.decode(value,{stream:true});
          const lines=buffer.split('\n');
          buffer=lines.pop()||'';

          for(const raw of lines){
            const line=raw.trim();
            if(!line.startsWith('data:'))continue;
            const data=line.slice(5).trim();
            if(data==='[DONE]')continue;

            try{
              const json=JSON.parse(data);
              const deltaPayload=json?.choices?.[0]?.delta||{};
              let delta='';
              let thinkDelta=deltaPayload?.reasoning_content||'';
              if(Array.isArray(deltaPayload?.content)){
                const partResult=extractContentParts(deltaPayload.content);
                delta=partResult.text;
                if(partResult.thinking)thinkDelta+=partResult.thinking;
              }else{
                delta=deltaPayload?.content||'';
              }
              if(thinkDelta)thinking+=thinkDelta;
              if(delta)full+=delta;
              if((thinkDelta||delta)&&!signal?.aborted)onDelta&&onDelta(full,thinking);
            }catch{}
          }
        }
      }finally{
        if(this.activeReader===reader)this.activeReader=null;
      }
      return{content:full||'(空响应)',thinking};
    }else{
      const data=await res.json();
      const message=data?.choices?.[0]?.message||{};
      let content='(空响应)';
      let thinking=message?.reasoning_content||'';
      if(Array.isArray(message?.content)){
        const partResult=extractContentParts(message.content);
        content=partResult.text||'(空响应)';
        if(partResult.thinking)thinking+=partResult.thinking;
      }else{
        content=message?.content||'(空响应)';
      }
      return{content,thinking};
    }
  }

  async sendAnthropic(session,cfg,onDelta,signal){
    const base=(cfg.base||'https://api.anthropic.com/v1').replace(/\/+$/,'');
    const url=`${base}/messages`;
    const model=cfg.model||'claude-3-5-sonnet-20240620';
    const {messages,system}=this.buildAnthropicMessages(session);
    const body={
      model,
      messages,
      stream:!!cfg.stream,
      max_tokens:cfg.max_tokens||4096
    };

    if(system)body.system=system;
    if(cfg.temperature!=null&&cfg.temperature!==0)body.temperature=cfg.temperature;
    if(cfg.top_p!=null&&cfg.top_p!==0)body.top_p=cfg.top_p;

    const res=await fetch(url,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':cfg.key||'',
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify(body),
      signal
    });

    if(!res.ok)throw new Error(`HTTP ${res.status}`);

    if(cfg.stream){
      const reader=res.body.getReader();
      this.activeReader=reader;
      const decoder=new TextDecoder();
      let buffer='',full='',thinking='';

      try{
        while(true){
          const{done,value}=await reader.read();
          if(done)break;
          buffer+=decoder.decode(value,{stream:true});
          const lines=buffer.split('\n');
          buffer=lines.pop()||'';

          for(const raw of lines){
            const line=raw.trim();
            if(!line.startsWith('data:'))continue;
            const data=line.slice(5).trim();
            if(!data||data==='[DONE]')continue;

            try{
              const json=JSON.parse(data);
              if(json.type==='content_block_start'){
                const block=json.content_block||{};
                if(block.type==='text'&&block.text){
                  full+=block.text;
                }else if(block.type==='thinking'){
                  if(block.thinking)thinking+=block.thinking;
                  if(block.text)thinking+=block.text;
                }
              }
              if(json.type==='content_block_delta'){
                const delta=json.delta||{};
                if(delta.type==='text_delta'&&delta.text){
                  full+=delta.text;
                }else if(delta.type==='thinking_delta'&&delta.thinking){
                  thinking+=delta.thinking;
                }
              }
              if((json.type==='content_block_start'||json.type==='content_block_delta')&&onDelta){
                if(!signal?.aborted)onDelta(full,thinking);
              }
            }catch{}
          }
        }
      }finally{
        if(this.activeReader===reader)this.activeReader=null;
      }
      return{content:full||'(空响应)',thinking};
    }else{
      const data=await res.json();
      let content='(空响应)';
      let thinking='';
      if(Array.isArray(data?.content)){
        const textParts=[];
        data.content.forEach((part)=>{
          if(part?.type==='text'&&part?.text)textParts.push(part.text);
          if(part?.type==='thinking'){
            if(part?.thinking)thinking+=part.thinking;
            if(part?.text)thinking+=part.text;
          }
        });
        if(textParts.length)content=textParts.join('');
      }
      return{content,thinking};
    }
  }
  
  async sendGemini(session,cfg,isProxy,onDelta,signal){
    const base=isProxy?
      (cfg.proxyUrl||'http://127.0.0.1:8889').replace(/\/+$/,''):
      (cfg.base||'https://generativelanguage.googleapis.com').replace(/\/+$/,'');
    
    const model=cfg.model||'gemini-2.5-pro';
    const action = cfg.stream ? 'streamGenerateContent' : 'generateContent';
let url = `${base}/v1beta/models/${encodeURIComponent(model)}:${action}`;
const qs = [];
if (cfg.stream) qs.push('alt=sse');
if (!isProxy && cfg.key) qs.push(`key=${encodeURIComponent(cfg.key)}`);
if (qs.length) url += `?${qs.join('&')}`;
    
    const contents=[];
    const pc=this.state.getSessionPromptConfig(session);
    
    if(pc.firstUser)contents.push({role:'user',parts:[{text:pc.firstUser}]});
    
    const history=session.history||[];
    history.forEach((m,i)=>{
      const isLastUser=m.role==='user'&&i===history.length-1;
      const content=(isLastUser&&pc.messagePrefix)?pc.messagePrefix+m.content:m.content;
      
      if(m.role==='assistant')contents.push({role:'model',parts:[{text:m.content}]});
      if(m.role==='user')contents.push({role:'user',parts:[{text:content}]});
    });
    
    if(pc.assistantPrefill)contents.push({role:'model',parts:[{text:pc.assistantPrefill}]});
    
    const generationConfig={};
    if(cfg.temperature!=null&&cfg.temperature!==0)generationConfig.temperature=cfg.temperature;
    if(cfg.top_p!=null&&cfg.top_p!==0)generationConfig.topP=cfg.top_p;
    if(cfg.top_k!=null&&cfg.top_k!==0)generationConfig.topK=cfg.top_k;
    if(cfg.max_output_tokens!=null&&cfg.max_output_tokens!==0)generationConfig.maxOutputTokens=cfg.max_output_tokens;
    
    // ✅ 添加思维链支持 - 根据官方文档格式
    if(cfg.useThinking){
      // thinkingBudget: -1=自动(动态), 0=禁用, 1-24576=指定token数
      const budget=cfg.thinkingBudget!=null?cfg.thinkingBudget:-1;
      generationConfig.thinkingConfig={
        thinkingBudget:budget,
        includeThoughts:true
      };
    }
    
    // ✅ 构建请求体 - 按照官方文档推荐的字段顺序
    const body={
      contents
    };
    
    // systemInstruction 应该在 contents 之后
    if(pc.sysPrompt){
      body.systemInstruction={
        parts:[{text:pc.sysPrompt}]
      };
    }
    
    // safetySettings
    body.safetySettings=['HARM_CATEGORY_HARASSMENT','HARM_CATEGORY_HATE_SPEECH',
      'HARM_CATEGORY_SEXUALLY_EXPLICIT','HARM_CATEGORY_DANGEROUS_CONTENT']
      .map(category=>({category,threshold:'OFF'}));
    
    // generationConfig 放在最后
    body.generationConfig=generationConfig;
    
    const headers = {'Content-Type':'application/json', ...(cfg.stream?{'Accept':'text/event-stream'}:{})};
if (!isProxy && cfg.key) headers['X-Goog-Api-Key'] = cfg.key;
if (isProxy && cfg.proxyPass) headers.Authorization = `Bearer ${cfg.proxyPass}`;
    
    const res=await fetch(url,{
      method:'POST',
      headers,
      body:JSON.stringify(body),
      signal
    });
    
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    
    if(cfg.stream){
      const reader = res.body.getReader();
      this.activeReader=reader;
      const decoder = new TextDecoder();
      let pending = '', eventData = '', full = '', thinking = '';
      try{
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          pending += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = pending.indexOf('\n')) !== -1) {
            const line = pending.slice(0, idx).trimEnd();
            pending = pending.slice(idx + 1);
            if (line === '') {
              if (eventData) {
                try {
                  const obj = JSON.parse(eventData);
                  const parts = obj?.candidates?.[0]?.content?.parts || [];
                  for (const p of parts) {
                    if (p.thought) thinking += p.text || '';
                    else if (p.text) full += p.text;
                  }
                  if (!signal?.aborted && onDelta) onDelta(full, thinking, obj.usageMetadata);
                } catch {}
                eventData = '';
              }
              continue;
            }
            if (line.startsWith('data:')) eventData += line.slice(5).trim() + '\n';
          }
        }
      }finally{
        if(this.activeReader===reader)this.activeReader=null;
      }
      return { content: full || '(空响应)', thinking };
    }else{
      const data=await res.json();
      const parts=data?.candidates?.[0]?.content?.parts||[];
      let content='',thinking='';
      for(const part of parts){
        if(part.thought){
          thinking+=part.text||'';
        }else if(part.text){
          content+=part.text;
        }
      }
      return{content:content||'(空响应)',thinking};
    }
  }
  
  abort(){
    if(this.abortController){
      try{this.abortController.abort();}catch{}
    }
    if(this.activeReader){
      const reader=this.activeReader;
      this.activeReader=null;
      try{reader.cancel();}catch{}
    }
  }
}

// ===== UIManager - 核心改进 =====
class UIManager{

  
  ensureBottom(retries=2, delay=120){
    const box=Utils.$('#messages'); if(!box) return;
    const stick=()=>{ try{ box.scrollTop = box.scrollHeight; }catch(_){} };
    requestAnimationFrame(()=>{
      stick();
      requestAnimationFrame(()=>{ stick(); });
    });
    if(retries>0){
      setTimeout(()=>this.ensureBottom(retries-1, delay), delay);
    }
  }
/* Release suppressed auto-stick and optionally scroll to bottom once */
  _releaseAutoStick(){
    const box=Utils.$('#messages');
    const doStick = this._pendingStick;
    this._suppressAutoStick=false;
    this._pendingStick=false;
    if(doStick && box && this.isAtBottom(box)){
      requestAnimationFrame(()=>{ box.scrollTop = box.scrollHeight; });
    }
  }

  constructor(state,api){
    this.state=state;
    this._suppressAutoStick=false;
    this._pendingStick=false;
    this._vvAvailable=typeof window!=='undefined' && window.visualViewport;
    this._vpFrozen=false;
    this._vvListener=null;
    this._unfreezeTimer=null;
    this.api=api;
    this.dom=new DOMManager();
    this.events=new EventHub();
    this.sanitizer=new SmartSanitizer();
    this.domDiffer=new DOMDiffer();
    this.domPool=new DOMPool();
    this.regexProcessor=new RegexProcessor();
    this.observerMgr=new LeakSafeObserverManager();
    this.windowManager=new MessageWindowManager();
    this.promptPresetDraft=null;

    // ✅ 核心改进1：维护idx到element的映射
    this.messageElements=new Map();
    
    // ✅ 核心改进2：缓存typing的body元素
    this.typingBodyCache=null;
    
    // ✅ 核心改进3：批量更新
    this.pendingUpdates=new Set();
    this.updateScheduled=false;
    
    // ✅ 编辑状态跟踪
    this.editingState=null;  // {msgId, originalContent}
    
    this.isSending=false;
    this.typingElement=null;
    this._scrollRAF=null;
    this._settingsRendered=false;
    this.isLoadingEarlier=false;
    this._pendingAutoLoad=false;
    this._regexInputDebounced=null;
    this._pendingTypingUpdate=null;
    this._appHidden=(window.__APP_VISIBILITY__==='background')||!!document.hidden;
    this._currentBatcher=null;
    this._pendingFoldCheck=false;

    window._sanitizer=this.sanitizer;

    this.events.on(document,'visibilitychange',()=>{
      this._handleVisibilityChange(document.hidden);
    });
  }

  _clonePromptPreset(preset){
    if(!preset)return{
      name:'',
      sysPrompt:'',
      firstUser:'',
      firstAssistant:'',
      messagePrefix:'',
      assistantPrefill:'',
      regexRules:[]
    };
    try{
      if(typeof structuredClone==='function')return structuredClone(preset);
    }catch(_){/* ignore */}
    try{
      return JSON.parse(JSON.stringify(preset));
    }catch(_){
      const cloned={
        name:preset.name||'',
        sysPrompt:preset.sysPrompt||'',
        firstUser:preset.firstUser||'',
        firstAssistant:preset.firstAssistant||'',
        messagePrefix:preset.messagePrefix||'',
        assistantPrefill:preset.assistantPrefill||'',
        regexRules:Array.isArray(preset.regexRules)?preset.regexRules.map(rule=>({
          name:rule?.name||'',
          pattern:rule?.pattern||'',
          replacement:rule?.replacement||''
        })):[
        ]
      };
      return cloned;
    }
  }

  /* === Motion & Scroll helpers (added) === */
  animateIn(el){
    if(!el) return;
    el.classList.add('is-entering');
    requestAnimationFrame(()=>{
      el.classList.add('is-active');
      const done=()=>{
        el.classList.remove('is-entering','is-active');
        el.removeEventListener('transitionend',done);
      };
      el.addEventListener('transitionend',done);
      setTimeout(done, 320); // fallback
    });
  }
  animateOut(el){
    return new Promise(res=>{
      if(!el) return res();
      el.classList.add('is-exiting');
      const done=()=>{ el.removeEventListener('transitionend',done); res(); };
      el.addEventListener('transitionend',done);
      setTimeout(done, 280);
    });
  }

  _handleVisibilityChange(isHidden){
    const hidden=!!isHidden;
    if(this._appHidden===hidden)return;
    this._appHidden=hidden;
    if(hidden){
      this.dom.stopAutoCleanup();
      if(this._currentBatcher){
        this._currentBatcher.setBackgroundMode(true);
      }
    }else{
      this.dom.startAutoCleanup();
      this.flushPendingTyping(true);
      if(this._currentBatcher){
        this._currentBatcher.setBackgroundMode(false);
        this._currentBatcher.flushPending(true);
      }
    }
  }

  _isBackgroundActive(){
    return !!this._appHidden;
  }

  flushPendingTyping(forceStick=false){
    const pending=this._pendingTypingUpdate;
    if(!pending)return;
    this._pendingTypingUpdate=null;
    const {el,text,thinking}=pending;
    if(!el||!el.isConnected)return;
    this.updateTyping(el,text,thinking,true);
    if(forceStick){
      try{
        const box=Utils.$('#messages');
        if(box&&this.isAtBottom(box)){
          requestAnimationFrame(()=>{ box.scrollTop=box.scrollHeight; });
        }
      }catch(e){}
    }
  }

  onNativeVisibilityChange(state){
    this._handleVisibilityChange(state==='background');
  }
  preserveScroll(fn){
    const box=Utils.$('#messages');
    if(!box){ fn&&fn(); return; }
    const gap = box.scrollHeight - box.scrollTop - box.clientHeight;
    fn&&fn();
    requestAnimationFrame(()=>{
      box.scrollTop = Math.max(0, box.scrollHeight - box.clientHeight - gap);
    });
  }
  captureScrollState(){
    const box=Utils.$('#messages');
    if(!box)return null;
    return{
      box,
      top: box.scrollTop,
      height: box.scrollHeight,
      atBottom: this.isAtBottom(box)
    };
  }
  restoreScrollState(state){
    if(!state||!state.box)return;
    const box=state.box;
    if(state.atBottom){
      box.scrollTop=box.scrollHeight;
    }else{
      box.scrollTop=state.top;
    }
  }
  finalizeTypingAndAppend(typing,msg){
    this.preserveScroll(()=>{
      if(typing){
        this.removeTyping(typing);
      }
      this.appendMessage(msg);
      if(typeof this.flushUpdates==='function') this.flushUpdates();
    });
  }
  renumberMessagesFrom(startIdx=0){
    const session=this.state.getActiveSession();
    const history=session?.history||[];
    for(let i=startIdx;i<history.length;i++){
      const msg=history[i];
      const el=this.messageElements.get(msg.id);
      if(!el)continue;
      const pill=el.querySelector('header .pill');
      if(pill)pill.textContent = '#'+(i+1);
    }
  }

  /* === Viewport freeze to avoid IME-dismiss flicker on mobile === */
  freezeViewport(){
    try{
      if(!this._vvAvailable||this._vpFrozen) return;
      this._vpFrozen=true;
      const h=Math.round(window.innerHeight||document.documentElement.clientHeight);
      document.documentElement.style.setProperty('--vp-lock-h', h+'px');
      document.body.classList.add('vp-freeze');
      let last=performance.now();
      const onVV=()=>{ last=performance.now(); };
      this._vvListener=onVV;
      try{ visualViewport.addEventListener('resize', onVV, {passive:true}); }catch{}
      const poll=()=>{
        if(!this._vpFrozen) return;
        const elapsed=performance.now()-last;
        if(elapsed>150){ this.unfreezeViewport(); }
        else{ this._unfreezeTimer=setTimeout(poll,100); }
      };
      this._unfreezeTimer=setTimeout(poll, 160);
    }catch{}
  }
  unfreezeViewport(){
    try{
      if(!this._vpFrozen) return;
      this._vpFrozen=false;
      document.body.classList.remove('vp-freeze');
      document.documentElement.style.removeProperty('--vp-lock-h');
      if(this._vvListener){
        try{ visualViewport.removeEventListener('resize', this._vvListener); }catch{}
        this._vvListener=null;
      }
      if(this._unfreezeTimer){ clearTimeout(this._unfreezeTimer); this._unfreezeTimer=null; }
      try{ this._releaseAutoStick(); }catch{}
    }catch{}
  }

  ensureSession(){

  createNewSession(presetKey='default'){

  // ✅ 核心改进：使用Map而不是querySelectorAll
  renderMessages(scrollToBottom=false){
    const session=this.state.getActiveSession();
    const box=Utils.$('#messages');
    if(!session||!box)return;
    
    const history=session.history||[];
    const total=history.length;
    this.windowManager.evaluate(total);
    
    const win=this.windowManager.window;

    // 预先建立当前窗口内消息id到索引的映射，避免在遍历节点时重复扫描history
    const idToIndex=new Map();
    if(win&&Number.isInteger(win.start)&&Number.isInteger(win.end)){
      for(let i=win.start;i<=win.end;i++){
        const msg=history[i];
        if(msg&&msg.id)idToIndex.set(msg.id,i);
      }
    }

    // ✅ 移除窗口外的元素 - 使用msgId遍历
    const toRemove=[];
    for(let[msgId,el]of this.messageElements){
      // Find the index of this message in current history
      const msgIdx=idToIndex.has(msgId)?idToIndex.get(msgId):-1;
      if(msgIdx===-1||msgIdx<win.start||msgIdx>win.end){
        toRemove.push({msgId,el});
      }
    }
    
    const prevScrollHeight=box.scrollHeight;
    const prevScrollTop=box.scrollTop;
    
    // ✅ 检查要移除的消息中是否有正在编辑的
    if(this.editingState){
      const isEditingBeingRemoved=toRemove.some(({msgId})=>msgId===this.editingState.msgId);
      if(isEditingBeingRemoved){
        this.autoSaveEditingMessage();
      }
    }
    
    toRemove.forEach(({msgId,el})=>{
      this.domPool.release('article',el);
      el.remove();
      this.messageElements.delete(msgId);
    });
    
    const scrollAdjust=prevScrollHeight-box.scrollHeight;
    if(scrollAdjust>0&&!scrollToBottom){
      box.scrollTop=Math.max(0,prevScrollTop-scrollAdjust);
    }
    
    // 添加新元素 - 使用msgId检查是否已存在
    const fragment=document.createDocumentFragment();
    const __addedEls=[];
    for(let i=win.start;i<=win.end;i++){
      const msg=history[i];
      if(msg&&!this.messageElements.has(msg.id)){
        const el=this.buildMessageElement(msg,i);
        this.messageElements.set(msg.id,el);
        fragment.appendChild(el);
        __addedEls.push(el);
      }
    }
    
    if(fragment.childNodes.length){
      box.appendChild(fragment);
      __addedEls.forEach(el=>this.animateIn(el));
    }
    
    this.updateLoadTip(box,win);
    
    if(scrollToBottom){
      if(!this._suppressAutoStick){
        requestAnimationFrame(()=>{ box.scrollTop=box.scrollHeight; });
        this.ensureBottom(1, 140);
      }else{
        this._pendingStick=true;
      }
    }
  }
  
  // ✅ 核心改进：复用子元素而不是重建
  buildMessageElement(msg,idx){
    const el=this.domPool.acquire('article',`msg ${msg.role}`);
    
    // 查找或创建子元素
    let header=el.querySelector('header');
    if(!header){
      header=document.createElement('header');
      el.appendChild(header);
    }
    
    let body=el.querySelector('.body');
    if(!body){
      body=document.createElement('div');
      body.className='body';
      el.appendChild(body);
    }
    
    let footer=el.querySelector('footer');
    if(!footer){
      footer=document.createElement('footer');
      el.appendChild(footer);
    }
    
    footer.style.display=''; footer.hidden=false; footer.removeAttribute('style');
// 更新内容
    const badge=msg.role==='assistant'&&msg.modelName?
      `<span class="model-badge">${msg.modelName}</span>`:'';
    
    header.innerHTML=`<div class="role">${msg.role.toUpperCase()} ${badge}</div><div class="pill">#${idx+1}</div>`;
    
    body.dataset.msgId=msg.id;
    
    // ✅ 性能优化：使用DocumentFragment批量更新DOM
    const fragment=document.createDocumentFragment();
    
    // 添加思维链显示
    if(msg.thinking&&msg.thinking.trim()){
      const thinkingText=this.sanitizer.sanitize(msg.thinking);
      const details=document.createElement('details');
      details.style.cssText='margin-bottom:0.75rem;border:1px solid var(--border);border-radius:0.5rem;background:rgba(96,165,250,0.05);padding:0.75rem';
      
      const summary=document.createElement('summary');
      summary.style.cssText='cursor:pointer;font-weight:600;font-size:13px;color:var(--accent2);user-select:none;display:flex;align-items:center;gap:0.5rem';
      summary.innerHTML=`<span>💭 思维链</span><span style="font-size:11px;color:var(--muted);font-weight:normal">(${msg.thinking.length}字)</span>`;
      
      const content=document.createElement('div');
      content.style.cssText='margin-top:0.75rem;padding:0.75rem;font-size:13px;color:var(--fg);line-height:1.7;white-space:pre-wrap;border-top:1px solid var(--border)';
      content.innerHTML=thinkingText;
      
      details.appendChild(summary);
      details.appendChild(content);
      fragment.appendChild(details);
    }
    
    // 添加消息内容
    const contentDiv=document.createElement('div');
    contentDiv.innerHTML=this.sanitizer.sanitize(msg.content||'');
    fragment.appendChild(contentDiv);
    
    body.innerHTML='';
    body.appendChild(fragment);
    
    footer.innerHTML=`<button class="btn small" data-act="edit" data-msg-id="${msg.id}">编辑</button>${
      msg.role==='assistant'?`<button class="btn small" data-act="regen" data-msg-id="${msg.id}">重新生成</button>`:''
    }<button class="btn small warn" data-act="del" data-msg-id="${msg.id}">删除</button>`;
    
    el.dataset.msgId=msg.id;
    return el;
  }
  
  updateLoadTip(box,win){
    const tipEl=box.querySelector('.load-older');
    if(tipEl)tipEl.remove();

    if(win.enabled&&win.start>0&&!this.isLoadingEarlier&&!this._pendingAutoLoad&&!this.isNearBottom(box)){
      this._pendingAutoLoad=true;
      requestAnimationFrame(()=>{
        this._pendingAutoLoad=false;
        this.loadEarlierMessages();
      });
    }
  }

  maybeCollapseEarlierOnScroll(box){
    if(!box||this.isLoadingEarlier)return;

    const win=this.windowManager?.window;
    if(!win||!win.enabled)return;
    if(!this.isNearBottom(box))return;

    const session=this.state.getActiveSession();
    const history=session?.history||[];
    const total=history.length;
    if(!total)return;

    const prevStart=win.start;
    this.windowManager.appendNew(total,true);
    const targetStart=this.windowManager.window.start;
    if(targetStart<=prevStart)return;

    if(this.editingState){
      const editingIdx=history.findIndex(m=>m.id===this.editingState.msgId);
      if(editingIdx>-1&&editingIdx<targetStart){
        this.windowManager.window.start=prevStart;
        return;
      }
    }

    let removed=false;
    for(let i=0;i<targetStart;i++){
      const msg=history[i];
      if(!msg)continue;
      const el=this.messageElements.get(msg.id);
      if(!el)continue;
      this.domPool.release('article',el);
      el.remove();
      this.messageElements.delete(msg.id);
      removed=true;
    }

    if(removed){
      const sentinel=box.querySelector('.top-sentinel');
      if(sentinel){
        box.insertBefore(sentinel,box.firstChild);
      }
      requestAnimationFrame(()=>{ box.scrollTop=box.scrollHeight; });
    }

    this.updateLoadTip(box,this.windowManager.window);
  }

  loadEarlierMessages(){
    if(this.isLoadingEarlier)return;
    this.isLoadingEarlier=true;
    
    const session=this.state.getActiveSession();
    const box=Utils.$('#messages');
    if(!session||!box){
      this.isLoadingEarlier=false;
      return;
    }
    
    const info=this.windowManager.loadEarlier();
    if(!info){
      this.isLoadingEarlier=false;
      return;
    }
    
    const{newStart,oldStart}=info;
    const history=session.history;
    
    const prevHeight=box.scrollHeight;
    const prevTop=box.scrollTop;
    
    const fragment=document.createDocumentFragment();
    for(let i=newStart;i<oldStart;i++){
      const msg=history[i];
      if(msg&&!this.messageElements.has(msg.id)){
        const el=this.buildMessageElement(msg,i);
        this.messageElements.set(msg.id,el);
        fragment.appendChild(el);
      }
    }
    
    const sentinel=box.querySelector('.top-sentinel');
    if(sentinel){
      const anchor=sentinel.nextSibling;
      if(anchor){
        box.insertBefore(fragment,anchor);
      }else{
        box.appendChild(fragment);
      }
      box.insertBefore(sentinel,box.firstChild);
    }else{
      const anchor=box.firstChild;
      if(anchor){
        box.insertBefore(fragment,anchor);
      }else{
        box.appendChild(fragment);
      }
    }

    const delta=box.scrollHeight-prevHeight;
    box.scrollTop=prevTop+delta;

    this.isLoadingEarlier=false;
    this.updateLoadTip(box,this.windowManager.window);
  }
  
  setupTopObserver(){
    const box=Utils.$('#messages');
    if(!box||!('IntersectionObserver'in window))return;
    
    let sentinel=box.querySelector('.top-sentinel');
    if(!sentinel){
      sentinel=document.createElement('div');
      sentinel.className='top-sentinel sentinel';
    }
    
    this.observerMgr.cleanup('message-top');
    const observer=this.observerMgr.create('message-top',box,(entry)=>{
      if(!entry.isIntersecting)return;
      
      const win=this.windowManager.window;
      if(!win.enabled||win.start<=0||this.isLoadingEarlier)return;
      
      this.loadEarlierMessages();
      
      const tip=box.querySelector('.load-older');
      const anchor=tip?tip.nextElementSibling:box.firstChild;
      if(sentinel.nextSibling!==anchor&&anchor){
        box.insertBefore(sentinel,anchor);
      }
    },{threshold:0,rootMargin:'50px'});
    
    const tip=box.querySelector('.load-older');
    const anchor=tip?tip.nextElementSibling:box.firstChild;
    if(anchor){
      box.insertBefore(sentinel,anchor);
    }else{
      box.insertBefore(sentinel,box.firstChild);
    }
    
    this.observerMgr.observe('message-top',sentinel);
  }
  
  // ✅ 核心改进：批量更新
  appendMessage(msg){
    const session=this.state.getActiveSession();
    if(!session)return;
    
    if(!msg.id)msg.id=`msg_${Date.now()}_${Math.random().toString(36).slice(2,9)}`;
    session.history.push(msg);
    
    this.pendingUpdates.add(msg.id);
    this.scheduleUpdate();
  }
  
  scheduleUpdate(){
    if(this.updateScheduled)return;
    this.updateScheduled=true;
    
    requestAnimationFrame(()=>{
      this.flushUpdates();
      this.updateScheduled=false;
    });
  }
  
  flushUpdates(){
    if(this.pendingUpdates.size===0)return;

    const session=this.state.getActiveSession();
    if(!session)return;

    const history=session.history;
    const total=history.length;
    const box=Utils.$('#messages');
    if(!box)return;

    const isNearBottom=this.isNearBottom(box);
    const isAtBottom=this.isAtBottom(box);
    const prevScrollHeight=box.scrollHeight;
    const prevScrollTop=box.scrollTop;

    this.windowManager.appendNew(total,isNearBottom);

    const win=this.windowManager.window;
    const fragment=document.createDocumentFragment();
    const __addedEls=[];

    const start=Math.max(0,win.start|0);
    const end=Math.min(total-1,win.end|0);
    const visibleIndexMap=new Map();

    for(let i=start;i<=end;i++){
      const msg=history[i];
      if(msg&&msg.id){
        visibleIndexMap.set(msg.id,i);
      }
    }

    const toRemove=[];
    for(const[msgId,el]of this.messageElements){
      const idx=visibleIndexMap.get(msgId);
      if(idx===undefined){
        toRemove.push({msgId,el});
      }
    }

    if(this.editingState){
      const isEditingBeingRemoved=toRemove.some(({msgId})=>msgId===this.editingState.msgId);
      if(isEditingBeingRemoved){
        this.autoSaveEditingMessage();
      }
    }

    toRemove.forEach(({msgId,el})=>{
      this.domPool.release('article',el);
      el.remove();
      this.messageElements.delete(msgId);
    });

    for(const msgId of this.pendingUpdates){
      const idx=visibleIndexMap.get(msgId);
      if(idx===undefined)continue;

      const msg=history[idx];
      if(!msg||this.messageElements.has(msgId))continue;

      const el=this.buildMessageElement(msg,idx);
      this.messageElements.set(msgId,el);
      fragment.appendChild(el);
      __addedEls.push(el);
    }

    if(fragment.childNodes.length){
      box.appendChild(fragment);
      __addedEls.forEach(el=>this.animateIn(el));
    }

    const scrollAdjust=prevScrollHeight-box.scrollHeight;
    if(scrollAdjust>0 && !isNearBottom){
      box.scrollTop=Math.max(0,prevScrollTop-scrollAdjust);
    }else if(isAtBottom){
      if(!this._suppressAutoStick){
        requestAnimationFrame(()=>{ box.scrollTop=box.scrollHeight; });
      }else{
        this._pendingStick=true;
      }
    }

    this.updateLoadTip(box,win);
    this.pendingUpdates.clear();
  }
  
  renderSidebar(){
    Utils.scheduleIdleTask(()=>{
      this._doRefreshSidebar();

  }
  
  _doRefreshSidebar(){

      fragment.appendChild(div);

  updateModelSelectors(){
    const presets=this.state.getActivePresets();
    const currentIndex=this.state.get('currentModelIndex');

  async sendMessage(){
    if(this.isSending){
      ErrorHandler.show('请等待当前消息发送完成');
      return;
    }
    
    if(this.isMessageEditing()){
      ErrorHandler.show('请先完成或取消正在进行的编辑');
      return;
    }
    
    // ✅ Immediately set flag to prevent race condition
    this.isSending=true;
    this.setSending(true);
    
    const session=this.state.getActiveSession();
    const sessionId=this.state.get('currentId');
    let sessionDirty=false;
    const input=Utils.$('#input');
    if(!session||!input){
      this.isSending=false;
      this.setSending(false);
      return;
    }
    
    const text=input.value.trim();
    if(!text&&session.history.length===0){
      this.isSending=false;
      this.setSending(false);
      return;
    }
    
    this._suppressAutoStick=true; this._pendingStick=false;
    if(text){
      if(this._vvAvailable) this.freezeViewport();
      this.appendMessage({role:'user',content:text});
      if (typeof this.flushUpdates === 'function') this.flushUpdates();
      input.value='';
      sessionDirty=true;
    }
    
    const preset=this.state.getCurrentPreset();
    if(!preset){
      ErrorHandler.show('请先配置至少一个模型预设');
      this.isSending=false;
      this.setSending(false);
      return;
    }

    const notifyNativeStreaming=(flag)=>{
      try{
        if(window.HtmlAppNative&&typeof window.HtmlAppNative.notifyStreamingState==='function'){
          window.HtmlAppNative.notifyStreamingState(!!flag);
        }
      }catch(_){ }
    };

    const promptPreset=this.state.getSessionPromptConfig(session);
    const isStream=preset?.config?.stream;
    notifyNativeStreaming(true);

    let typing=null; let __typingStart=0; let __typingTimer=null;
    let partial='',partialThinking='';
    const TYPING_DELAY=90;
    __typingTimer=setTimeout(()=>{ typing=this.addTyping(isStream); __typingStart=performance.now(); }, TYPING_DELAY);
    const batcher=isStream?new AdaptiveStreamBatcher((text,thinking)=>{
      if(typing) this.updateTyping(typing,text,thinking);
    }):null;
    if(batcher){
      this._currentBatcher=batcher;
      batcher.setBackgroundMode(this._isBackgroundActive());
    }

    try{
      const result=await this.api.send(session,(text,thinking)=>{
        partial=text;
        partialThinking=thinking||'';
        if(batcher)batcher.push(text,thinking);
        else this.updateTyping(typing,text,thinking);
      });

      if(__typingTimer){ clearTimeout(__typingTimer); __typingTimer=null; }
      
      // ✅ 处理返回的content和thinking
      const content=typeof result==='string'?result:result.content;
      const thinking=typeof result==='object'?result.thinking:'';
      
      // ✅ 只在流式完成后应用正则
      let finalContent=content;
      if(promptPreset.regexRules&&promptPreset.regexRules.length>0){
        const compiledRules=this.regexProcessor.compileRules(promptPreset.regexRules);
        if(compiledRules){
          finalContent=this.regexProcessor.process(content,compiledRules);
        }
      }
      
      (function(){ try{ if (this.typingElement) this.typingElement.removeAttribute('data-streaming'); }catch(_){} }).call(this);
      this.finalizeTypingAndAppend(typing,{
        role:'assistant',
        content:finalContent,
        thinking:thinking||'',
        modelName:preset?.name
      });
      sessionDirty=true;
    }catch(error){
      if(__typingTimer){ clearTimeout(__typingTimer); __typingTimer=null; }

      const isAbort=error?.name==='AbortError';
      if(isAbort&&isStream&&partial){
        let finalPartial=partial;
        if(promptPreset.regexRules&&promptPreset.regexRules.length>0){
